<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Zone</title>

  <link rel="stylesheet" href="style.css">

  <script defer src="script.js"></script>
</head>
<body>

  <nav>
    <h1>FLEX ZONE</h1>

    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#cars">Cars</a></li>
      <li><a href="#setup">Setup</a></li>
      <li><a href="#money">Lifestyle</a></li>
    </ul>
  </nav>

  <section class="hero" id="home">

    <div class="overlay"></div>

    <div class="hero-content">

      <h2>WELCOME TO THE FLEX LIFE</h2>

      <p>
        Cars. Money. Gaming. Luxury. Style.
      </p>

      <button onclick="showMessage()">
        Enter Flex
      </button>

    </div>

  </section>

  <section class="cards-section" id="cars">

    <h2>Luxury Cars</h2>

    <div class="cards">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200&auto=format&fit=crop">
        <h3>Lamborghini</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop">
        <h3>Supercars</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d?q=80&w=1200&auto=format&fit=crop">
        <h3>Night Drive</h3>
      </div>

    </div>

  </section>

  <section class="video-section">

    <h2>Flex Video</h2>

    <video controls autoplay muted loop>

      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">

    </video>

  </section>

  <section class="cards-section" id="setup">

    <h2>Gaming Setup</h2>

    <div class="cards">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=1200&auto=format&fit=crop">
        <h3>RGB Setup</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1598550476439-6847785fcea6?q=80&w=1200&auto=format&fit=crop">
        <h3>Streaming Room</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">
        <h3>Gaming Beast</h3>
      </div>

    </div>

  </section>

  <section class="quote-section" id="money">

    <h2>"Success is the best flex."</h2>

  </section>

  <footer>

    <h3>Made By Prajwal Pokharel</h3>

  </footer>

</body>
</html>
